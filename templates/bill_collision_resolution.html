{% extends "layout.html" %}
{% block content %}
<div class="container py-4">
    <div class="card border-warning">
        <div class="card-header bg-warning text-dark fw-bold">
            Bill Reference Collision
        </div>
        <div class="card-body">
            <p class="mb-3">
                The bill reference <span class="badge bg-dark">{{ bill_no }}</span> exists in multiple modules.
                Choose the exact document to open.
            </p>
            <div class="d-flex flex-wrap gap-2">
                {% for src, row in candidates.items() %}
                <a class="btn btn-outline-info" href="{{ url_for('view_bill', bill_no=row.bill_no, src=src, src_id=row.id) }}">
                    {{ row.label }}
                </a>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
